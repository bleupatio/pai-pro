# pai-pro — Docker Compose stack.
#
# Quickstart:
#   cp .env.example .env && $EDITOR .env
#   ./scripts/docker-start.sh
#   → http://localhost:7588

services:
  pai-pro:
    build:
      context: .
      dockerfile: Dockerfile
    image: pai-pro:local
    container_name: pai-pro
    # Host port offset to 7588 by default so `./scripts/start.sh` on the host
    # can keep using 7488 alongside Docker. Override via .env.
    #
    # Host-side bind pinned to 127.0.0.1 because the viewer has no auth
    # and exposes pty:spawn (process launch in a project's cwd) over
    # Socket.IO. The container still binds 0.0.0.0:7488 internally —
    # required for Docker's port forwarder — but the host-visible port
    # is loopback-only. To expose to LAN intentionally, first add auth,
    # then drop the `127.0.0.1:` prefix.
    ports:
      - "127.0.0.1:${HOST_VIEWER_PORT:-7588}:7488"
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      VIEWER_PORT: 7488
      VIEWER_BIND: 0.0.0.0
      # Controls only the default owner for newly-created projects.
      # Existing projects keep their saved meta.json agent_id.
      PAI_DEFAULT_AGENT_ID: "${PAI_DEFAULT_AGENT_ID:-}"
      # Per-project agents bypass their permission/sandbox guardrails by
      # default (safe inside this container). Set PAI_AGENT_BYPASS=0 to
      # restore prompts. Empty = on, matching the in-code default.
      PAI_AGENT_BYPASS: "${PAI_AGENT_BYPASS:-}"
      # Re-read for the viewer's boot banner so users see the URL they
      # should actually open, not the container-internal port.
      HOST_VIEWER_PORT: "${HOST_VIEWER_PORT:-7588}"
    volumes:
      # Customer's canvas data — named volume so it survives container rebuild.
      # NEVER rename this key across versions — customer data lives in it forever.
      - pai_projects:/repo/projects
      # Bind-mount the host's Claude session JSONLs so the canvas can
      # resume Claude sessions across container restarts. Optional — if the
      # host has no ~/.claude/projects yet, Docker creates an empty dir.
      # ${HOME:-${USERPROFILE}} → POSIX shells use $HOME; Windows
      # PowerShell where $env:HOME may be unset falls back to $USERPROFILE
      # (always set by the OS).
      - ${HOME:-${USERPROFILE}}/.claude/projects:/home/node/.claude/projects
      # Docker-owned Codex home. Keeps container sessions/config persistent
      # without loading host-only MCP config into the container.
      - pai_codex:/home/node/.codex
      # Optional read-only host Codex home. Entrypoint imports only auth.json
      # from here when the Docker Codex home has no auth yet.
      - ${HOME:-${USERPROFILE}}/.codex:/home/node/.codex-host:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:7488/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      # Entrypoint verifies the Cloudflare tunnel before booting the viewer,
      # so give that setup window time before healthcheck failures count.
      start_period: 150s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"

  # Cloudflared "quick tunnel" runs INSIDE the pai-pro container as a
  # background process (see entrypoint.sh). We tried a sidecar service
  # initially, but cloudflare/cloudflared:latest is distroless (no /bin/sh)
  # which made the URL-extraction wrapper unworkable. The viewer image
  # already ships the cloudflared binary, so one container is simpler.
  # Skip the tunnel by setting PUBLIC_VIEWER_URL in .env (entrypoint
  # writes that as the canonical .tunnel_url instead).

volumes:
  # Locked key — customer data lives in this volume across container rebuilds.
  pai_projects:
  # Docker Codex auth/session state. Separate from host ~/.codex so host-only
  # MCP config cannot break the container's Codex startup.
  pai_codex:
